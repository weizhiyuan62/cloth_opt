defaults:
  - env: default
  - policy: diagonal_fold
  - render: enabled
  - _self_

seed: 0

env:
  reset_height: 0.02
  n_substeps: 10

hydra:
  run:
    dir: outputs/diagonal_fold/${now:%Y-%m-%d}/${now:%H-%M-%S}
  job:
    chdir: true
  job_logging:
    handlers:
      console:
        class: logging.StreamHandler
        formatter: simple
        level: INFO
        stream: ext://sys.stdout
      file:
        class: logging.FileHandler
        formatter: simple
        level: INFO
        filename: ${hydra.runtime.output_dir}/${hydra.job.name}.log
    root:
      level: INFO
      handlers: [console, file]
