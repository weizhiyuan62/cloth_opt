name: diagonal_fold

setup:
  # main: top-left to bottom-right; anti: top-right to bottom-left.
  fold_diagonal: main
  # The corner selects the two outer boundary edges on the moving side.
  controlled_corner: top_right
  # Offset 0 pins only the full diagonal crease, independent of resolution.
  pinned_line_offsets: [0]
  pin_final_state: false
  initial_settle_frames: 30
  final_settle_frames: 100

params:
  early_lift_angle: 35.0
  rotate_end_angle: 145.0
  final_angle: 180.0
  layer_gap: 0.01
  grasp_hold_frames: 40
  early_lift_frames: 60
  rotate_frames: 180
  place_frames: 70
  hold_frames: 70
  position_gain: 2000.0
  max_force: 500.0

objective:
  alignment_weight: 10.0
  energy_weight: 0.05
  stationary_weight: 2.0
  crease_weight: 1.0
  stretch_weight: 1.0
  max_stretch_weight: 2.0
  penetration_weight: 10.0
  terminal_velocity_weight: 0.5
  smoothness_weight: 0.05
  # Fractions of cloth extent (speed is measured in extents per second).
  success_alignment: 0.10
  success_max_speed: 0.10
  success_aesthetic_quality: 70.0
  success_max_stretch: 0.35
