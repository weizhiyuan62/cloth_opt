name: symmetric_fold

setup:
  controlled_edge: top
  # Only the outer edge is controlled. Offset 0 pins the resolution-derived center row.
  pinned_line_offsets: [0]
  pin_final_state: false
  initial_settle_frames: 30
  final_settle_frames: 100

params:
  lift_angle: 45.0
  transfer_angle: 165.0
  final_angle: 180.0
  layer_gap: 0.01
  lift_frames: 50
  transfer_frames: 120
  place_frames: 50
  hold_frames: 60
  position_gain: 2000.0
  max_force: 500.0

objective:
  alignment_weight: 10.0
  energy_weight: 0.05
  stretch_weight: 1.0
  max_stretch_weight: 2.0
  penetration_weight: 10.0
  terminal_velocity_weight: 0.5
  smoothness_weight: 0.05
  # Fractions of cloth extent (speed is measured in extents per second).
  success_alignment: 0.08
  success_max_speed: 0.10
  success_aesthetic_quality: 70.0
  success_max_stretch: 0.35
