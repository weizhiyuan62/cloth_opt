enabled: true
backend: polyscope
keep_frames: false
fps: 50
# auto tries GLFW first and EGL on a display-less Linux server.
# Use egl or glfw to require one backend explicitly.
engine: auto
image_width: 1280
image_height: 720
material: wax
camera:
  # Matches cpp/apps/optimization.cpp for the default 0.9 x 0.9 cloth.
  offset_xz: [1.3, 1.3]
  height: 1.3
  target_height: 0.3
appearance:
  # null preserves Polyscope's original default background.
  background_color: null
  cloth_color: [0.3, 0.7, 0.9]
  edge_width: 1.0
  smooth_shade: false
  ground_color: [0.5, 0.5, 0.5]
  ground_margin: 0.2
  ground_height: 0.0
  control_color: [1.0, 0.0, 0.0]
  control_radius: 0.015
  # Target markers are Python-rollout additions, absent from the original app.
  target_color: [0.0, 1.0, 0.0]
  target_radius: 0.012
