defaults:
  - env: default
  - policy: symmetric_fold
  - render: native
  - _self_

seed: 0

# Start on the table. For the even 10x10 grid, the fold axis lies between the
# two center rows. Several stationary-side rows are pinned to sharpen the fold.
env:
  reset_height: 0.0
  n_substeps: 10
  scene:
    width: 10
    height: 10
    spacing: 0.1

hydra:
  run:
    dir: outputs/symmetric_fold/${now:%Y-%m-%d}/${now:%H-%M-%S}
  job:
    chdir: true
  job_logging:
    handlers:
      console:
        class: logging.StreamHandler
        formatter: simple
        level: INFO
        stream: ext://sys.stdout
      file:
        class: logging.FileHandler
        formatter: simple
        level: INFO
        filename: ${hydra.runtime.output_dir}/${hydra.job.name}.log
    root:
      level: INFO
      handlers: [console, file]
